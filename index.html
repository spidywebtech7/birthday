<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magical Happy Birthday</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;800;900&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- INTRO SCREEN -->
    <section id="intro-screen" class="intro-active">
        <video autoplay loop muted playsinline class="space-bg">
            <source src="photots/5.MP4" type="video/mp4">
        </video>
        <div class="intro-content">
            <h1 class="gold-3d-text">HAPPY<br>BIRTHDAY<br>MANSHI</h1>
            <button id="gift-btn-1" class="gift-button">GIFT <i class="fas fa-gift"></i></button>
        </div>
    </section>

    <!-- MAIN FESTIVE ROOM SCREEN -->
    <section id="main-screen">
        <div class="room-bg"></div>
        
        <!-- Confetti container -->
        <div id="confetti-container"></div>
        
        <div class="main-content">
            <h1 class="main-title">Wishing You The Best <span class="highlight">Birthday</span> Ever!</h1>
            <p class="main-subtitle">May all your magical wishes come true.</p>
            <div class="gift-action-area">
                <button id="gift-btn-2" class="gift-button">GIFT <i class="fas fa-gift"></i></button>
            </div>
        </div>

        <!-- 11 Image Animated Gallery Container -->
        <div id="photo-gallery" class="photo-gallery-container"></div>
    </section>

    <script src="script.js"></script>
</body>
</html>
